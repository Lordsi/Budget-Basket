<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>try{var t=localStorage.getItem('bbTheme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.setAttribute('data-theme','dark');else document.documentElement.setAttribute('data-theme','light');}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Create Account - BudgetBasket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="auth-theme-toggle" style="position:fixed;top:1rem;right:1rem;z-index:100"></div>
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
    <div style="width:100%;max-width:28rem">
      <h1 style="font-size:2.25rem;font-weight:900;text-align:center;margin-bottom:0.5rem">Create Account</h1>
      <p style="color:#6b7280;text-align:center;margin-bottom:2rem">Join BudgetBasket and start saving</p>
      <form id="register-form" class="card" style="padding:2rem">
        <div id="error" style="display:none;padding:1rem;border-radius:0.5rem;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;font-size:0.875rem;font-weight:500;margin-bottom:1rem"></div>
        <div style="margin-bottom:1.5rem">
          <label for="name" style="display:block;font-size:0.875rem;font-weight:600;margin-bottom:0.5rem">Name</label>
          <input id="name" type="text" class="input" placeholder="Your name" required autocomplete="name">
        </div>
        <div style="margin-bottom:1.5rem">
          <label for="email" style="display:block;font-size:0.875rem;font-weight:600;margin-bottom:0.5rem">Email</label>
          <input id="email" type="email" class="input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div style="margin-bottom:1.5rem">
          <label for="password" style="display:block;font-size:0.875rem;font-weight:600;margin-bottom:0.5rem">Password</label>
          <input id="password" type="password" class="input" placeholder="••••••••" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full" id="submit-btn">Create Account</button>
      </form>
      <p style="margin-top:1.5rem;text-align:center;color:#4b5563">Already have an account? <a href="login.html" style="font-weight:700;color:var(--accent)">Log in</a></p>
    </div>
  </main>

  <script>window.API_BASE = (window.location.protocol === 'file:' ? 'http://localhost:5000' : window.location.origin) + '/api';</script>
  <script src="../js/icons.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    (function(){
      function upd(){var e=document.getElementById('auth-theme-toggle');if(!e||!window.bbTheme||!window.Icons)return;var d=window.bbTheme.getTheme()==='dark';e.innerHTML='<button type="button" class="nav-theme-btn" style="padding:0.5rem;background:var(--card-bg);border:1px solid var(--border);border-radius:0.5rem;cursor:pointer;color:var(--text-primary)" title="'+(d?'Light mode':'Dark mode')+'">'+(d?Icons.sun:Icons.moon)+'</button>';e.querySelector('button').onclick=function(){window.bbTheme.toggleTheme();upd();};}
      if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',upd);else upd();
    })();
  </script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    var form = document.getElementById('register-form');
    var errorEl = document.getElementById('error');
    var submitBtn = document.getElementById('submit-btn');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:1.25rem;height:1.25rem;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite"></span>';
      window.bbAuth.register(document.getElementById('name').value, document.getElementById('email').value, document.getElementById('password').value)
        .then(function() { window.location.href = '../products.html'; })
        .catch(function(err) {
          errorEl.textContent = err.message || 'Registration failed';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
        });
    });
    if (window.bbAuth && window.bbAuth.getUser()) window.location.href = '../products.html';
  </script>
</body>
</html>

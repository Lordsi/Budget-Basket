<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>try{var t=localStorage.getItem('bbTheme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.setAttribute('data-theme','dark');else document.documentElement.setAttribute('data-theme','light');}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Browse Products - BudgetBasket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">BudgetBasket</a>
      <div class="nav-right">
        <a href="products.html" class="nav-link nav-link-browse">Browse</a>
        <a href="basket.html" class="nav-basket" aria-label="Basket">
          <span class="nav-basket-icon" id="nav-cart-icon"></span>
          <span class="nav-basket-badge" id="nav-cart-badge" style="display:none">0</span>
        </a>
        <div class="nav-theme-toggle" id="nav-theme-toggle"></div>
        <div class="nav-user" id="nav-user"></div>
        <a href="basket.html" class="nav-basket nav-basket-mobile" aria-label="Basket">
          <span class="nav-basket-icon" id="nav-cart-icon-mobile"></span>
          <span class="nav-basket-badge" id="nav-cart-badge-mobile" style="display:none">0</span>
        </a>
        <button type="button" class="nav-menu-btn" id="nav-menu-btn" aria-label="Open menu"></button>
      </div>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-overlay" id="mobile-overlay"></div>
      <div class="mobile-panel" id="mobile-panel"></div>
    </div>
  </header>

  <div id="sticky-basket-bar" class="sticky-basket-bar" style="display:none"></div>

  <main class="page" style="background:#f9fafb">
    <div class="container" style="padding-top:2rem;padding-bottom:3rem">
      <h1 class="section-title" style="margin-bottom:2rem">Browse Products</h1>

      <div class="cat-pills-wrap" style="margin-bottom:1.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch">
        <div style="display:flex;gap:0.5rem;padding-bottom:0.5rem;min-width:max-content" class="cat-pills" id="cat-pills"></div>
      </div>

      <div style="margin-bottom:2rem;position:relative;max-width:28rem" class="search-wrap">
        <input type="search" id="search" class="input" placeholder="Search products (e.g. soap, Rice, Colgate)..." autocomplete="off" style="width:100%">
        <div id="search-suggest" class="search-suggest" style="display:none"></div>
      </div>

      <div id="content">
        <div class="prod-grid" id="prod-grid"></div>
        <div id="pagination" style="margin-top:3rem;display:flex;align-items:center;justify-content:center;gap:1rem"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <a href="index.html" class="footer-logo">BudgetBasket</a>
      <p class="footer-tagline">Build Smarter Baskets</p>
      <p class="footer-copy" id="footer-year"></p>
    </div>
  </footer>

  <script>window.API_BASE = (window.location.protocol === 'file:' ? 'http://localhost:5000' : window.location.origin) + '/api';</script>
  <script src="js/icons.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/basket.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
